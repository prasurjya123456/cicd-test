name: Full_Stack_Pipeline

on:
  push:
    branches: ["main"]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend
        working-directory: ./AS-03-Frontend
        run: npm install

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        working-directory: ./AS-03-Backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  deploy:
    needs: [frontend-check, backend-check]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/app"

      - name: SSH and Run App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e  # Ensures the script stops if any command fails (like npm run build)
            export PATH=$PATH:/home/${{ secrets.EC2_USERNAME }}/.nvm/versions/node/v20.x.x/bin
            cd ~/app

            # --- Backend ---
            cd AS-03-Backend
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt --no-cache-dir
            
            fuser -k 8000/tcp || true 
            nohup venv/bin/python -m uvicorn app:main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
            
            cd ..

            # --- Frontend ---
            cd AS-03-Frontend
            npm install --quiet
            npm run build
            
            fuser -k 3000/tcp || true
            nohup npm run preview -- --host 0.0.0.0 --port 3000 > frontend.log 2>&1 & disown

            echo "Deployment successful!"
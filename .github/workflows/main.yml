name: Full_Stack_Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend
        working-directory: ./AS-03-Frontend
        run: npm install

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Python Dependencies
        working-directory: ./AS-03-Backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  deploy:
    needs: [frontend-check, backend-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to app directory
            cd ~/cicd-test || git clone https://github.com/prasurjya123456/cicd-test.git ~/cicd-test
            cd ~/cicd-test
            git pull origin main

            # --- Backend Setup ---
            cd AS-03-Backend
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt --no-cache-dir
            
            # Kill existing process on port 8000 and restart
            fuser -k 8000/tcp || true
            nohup venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &

            cd ..

            # --- Frontend Setup ---
            cd AS-03-Frontend
            npm install --quiet
            npm run build
            
            # Kill existing process on port 3000 and restart
            fuser -k 3000/tcp || true
            nohup npm run preview -- --host 0.0.0.0 --port 3000 > frontend.log 2>&1 &

            echo "Deployment successful!"
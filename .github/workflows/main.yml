name: Full_Stack_Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './AS-03-Frontend/package-lock.json'

      - name: Install and Build Frontend
        working-directory: ./AS-03-Frontend
        run: |
          npm ci
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./AS-03-Frontend/dist

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Python Dependencies
        working-directory: ./AS-03-Backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-code
          path: ./AS-03-Backend

  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./deploy/frontend/dist

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-code
          path: ./deploy/backend

      - name: Copy Built Artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./deploy"
          target: "~/app"

      - name: SSH and Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/app/deploy

            # 1. Properly load NVM in this non-interactive shell
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 2. Verify node is loaded (helps with debugging logs)
            node -v

            # 3. Install PM2 and serve globally if they aren't already
            npm install -g pm2 serve --silent

            # --- Backend Deployment ---
            cd backend
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt --no-cache-dir
            
            # Start or restart FastAPI via PM2
            pm2 start "venv/bin/python -m uvicorn app:main:app --host 0.0.0.0 --port 8000" --name "as03-backend" || pm2 restart "as03-backend"
            
            cd ..

            # --- Frontend Deployment ---
            cd frontend
            
            # Start or restart React via PM2
            pm2 start "serve -s dist -l 3000" --name "as03-frontend" || pm2 restart "as03-frontend"

            # Save the process list so they auto-restart if the EC2 instance reboots
            pm2 save
            
            echo "Deployment successful!"
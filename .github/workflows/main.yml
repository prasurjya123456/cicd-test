name: Full_Stack_Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend
        working-directory: ./AS-03-Frontend # Tells the robot exactly where to go
        run: npm install

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Backend
        working-directory: ./AS-03-Backend # Tells the robot exactly where to go
        run: npm install
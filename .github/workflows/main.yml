name: Full_Stack_Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend
        working-directory: ./AS-03-Frontend
        run: npm install

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Python Dependencies
        working-directory: ./AS-03-Backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  deploy: # Fixed indentation here!
    needs: [frontend-check, backend-check] # ONLY runs if CI is green
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3 # Uses your PEM key secret
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            if [ ! -d "cicd-test" ]; then
              git clone https://github.com/prasurjya123456/cicd-test.git
            fi
            cd cicd-test
            git pull origin main
            echo "Deployment successful!"
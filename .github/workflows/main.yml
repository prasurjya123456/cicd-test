name: Full_Stack_Docker_CI_CD

on:
  push:
    branches: ["main"]

jobs:
  # ==========================================
  # PHASE 1: CONTINUOUS INTEGRATION (CI)
  # ==========================================
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './AS-03-Frontend/package-lock.json'

      - name: Test Frontend Build
        working-directory: ./AS-03-Frontend
        run: |
          npm ci
          npm run build
          # If you write tests later, add 'npm test' here!

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Test Backend Dependencies
        working-directory: ./AS-03-Backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # If you write tests later, add 'pytest' here!

  # ==========================================
  # PHASE 2: CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  deploy-cd:
    # The 'needs' keyword is the bridge between CI and CD. 
    # This job will ONLY run if both CI jobs above succeed.
    needs: [frontend-ci, backend-ci] 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Repository to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/app"

      - name: SSH and Start Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -ex
            cd ~/app
            
            # Create the .env file dynamically to inject AWS RDS credentials
            cat <<EOF > .env
            RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}
            RDS_USER=${{ secrets.RDS_USER }}
            RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
            EOF
            
            # Install Docker & Docker Compose if missing
            if ! command -v docker-compose &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-v2
            fi
            
            # Spin down old containers, rebuild images, and start
            sudo docker compose down
            sudo docker compose --env-file .env up --build -d
            
            # Clean up old unused images
            sudo docker image prune -f
            
            echo "Docker Deployment successful!"
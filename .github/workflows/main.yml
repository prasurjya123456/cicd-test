name: Docker_Cloud_Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Repository to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/app"

      - name: SSH and Start Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -ex
            cd ~/app
            
            # Create the .env file dynamically to inject your AWS RDS credentials
            cat <<EOF > .env
            RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}
            RDS_USER=${{ secrets.RDS_USER }}
            RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
            EOF
            
            # Install Docker & Docker Compose on the server if they are missing
            if ! command -v docker-compose &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-v2
            fi
            
            # Spin down old containers, rebuild the images with new code, and start them up
            sudo docker compose down
            sudo docker compose --env-file .env up --build -d
            
            # Clean up old unused images to save disk space on your EC2 instance
            sudo docker image prune -f
            
            echo "Docker Deployment successful!"
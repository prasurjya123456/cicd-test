name: Full_Stack_Auto_Deploy

on:
  push:
    branches: ["main"]

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Docker buildx
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:latest ./AS-03-Backend

      # Push Backend Image
      - name: Push Backend Image
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:latest

      # Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest ./AS-03-Frontend

      # Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:latest


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            echo "Pulling latest images"

            sudo docker pull ghcr.io/${{ github.repository }}/backend:latest
            sudo docker pull ghcr.io/${{ github.repository }}/frontend:latest

            echo "Stopping old containers"

            sudo docker stop backend || true
            sudo docker stop frontend || true

            sudo docker rm backend || true
            sudo docker rm frontend || true

            echo "Starting new containers"

            sudo docker run -d \
              --name backend \
              -p 8000:8000 \
              -e RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }} \
              -e RDS_USER=${{ secrets.RDS_USER }} \
              -e RDS_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              ghcr.io/${{ github.repository }}/backend:latest

            sudo docker run -d \
              --name frontend \
              -p 80:80 \
              ghcr.io/${{ github.repository }}/frontend:latest

            echo "Deployment finished"
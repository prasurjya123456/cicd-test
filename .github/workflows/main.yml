name: Full_Stack_Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Check the Frontend
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build Frontend
        working-directory: ./AS-03-Frontend
        run: |
          npm install
          npm run build --if-present

  # Job 2: Check the Backend
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Backend
        working-directory: ./AS-03-Backend
        run: npm install
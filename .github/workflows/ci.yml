name: Project CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Build & Package the Backend (FastAPI)
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AS-03-Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Backend Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/as-03-backend:latest .

  # Job 2: Build & Package the Frontend (React)
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AS-03-Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build React
        run: |
          npm install
          npm run build

      - name: Build Frontend Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/as-03-frontend:latest .
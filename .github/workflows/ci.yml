name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup the environment (Example for Backend)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Run your Tests (The "Integration" part)
      - name: Run Tests
        run: |
          pip install -r requirements.txt
          pytest  # This ensures your code isn't broken before building

      # 4. Build the Docker Image
      - name: Build Docker Image
        run: docker build -t my-app-name:latest .